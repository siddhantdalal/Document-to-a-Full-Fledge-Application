services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
    volumes:
      - .:/app
    working_dir: /app

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    working_dir: /app
    depends_on:
      - api
